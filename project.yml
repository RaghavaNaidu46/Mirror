name: HandMirror
options:
  bundleIdPrefix: com.rbchronicles
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

# Build settings live in Config/*.xcconfig — Base for shared values, Dev for
# local development, Dist for distribution builds. The project picks them
# per-configuration via `configFiles` on the target below. `fileGroups`
# surfaces the whole folder (including Base.xcconfig, which the others
# `#include`) in Xcode's navigator.
fileGroups:
  - Config

configFiles:
  Debug: Config/Dev.xcconfig
  Release: Config/Dist.xcconfig

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.1"

targets:
  HandMirror:
    type: application
    platform: macOS
    configFiles:
      Debug: Config/Dev.xcconfig
      Release: Config/Dist.xcconfig
    sources:
      - path: Sources/HandMirror
        excludes:
          - "Resources/Info.plist"
          - "Resources/HandMirror.entitlements"
    resources:
      - path: Sources/HandMirror/Resources/Assets.xcassets
        optional: true
    dependencies:
      - package: KeyboardShortcuts
    info:
      path: Sources/HandMirror/Resources/Info.plist
      properties:
        CFBundleName: HandMirror
        CFBundleDisplayName: HandMirror - Camera
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
        NSCameraUsageDescription: "HandMirror uses the camera to show a live preview so you can check your appearance before video calls."
        NSMicrophoneUsageDescription: "HandMirror uses the microphone to display live input levels for the Mic Check feature."
        NSPrincipalClass: NSApplication
        LSEnvironment:
          MTL_DEBUG_LAYER: "0"
          MTL_DEBUG_LAYER_ERROR_MODE: "nslog"
          MTL_HUD_ENABLED: "0"

# The Metal API validation layer raises a false-positive `didModifyRange:` assertion
# on Apple Silicon when AVCapture reactions render into the preview layer (the
# reactions compositor calls didModifyRange on a Shared-mode buffer, which is a
# no-op on unified memory but trips the validator). Use the Release config for
# the Run scheme so the validator never loads.
schemes:
  HandMirror:
    build:
      targets:
        HandMirror: all
    run:
      config: Release
      environmentVariables:
        - variable: MTL_DEBUG_LAYER
          value: "0"
          isEnabled: true
        - variable: MTL_DEBUG_LAYER_ERROR_MODE
          value: nslog
          isEnabled: true
      disableMetalAPIValidation: true
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
